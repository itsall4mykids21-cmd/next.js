<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Light theme gaming setup -->
  <defs>
    <linearGradient id="lightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#lightBg)"/>
  
  <!-- Desk -->
  <rect x="50" y="400" width="700" height="150" fill="#8b5cf6" rx="10"/>
  
  <!-- Monitor -->
  <rect x="200" y="150" width="400" height="280" fill="#1f2937" rx="15"/>
  <rect x="220" y="170" width="360" height="240" fill="url(#screenGlow)" rx="5"/>
  
  <!-- Gaming elements on screen -->
  <circle cx="300" cy="250" r="30" fill="#10b981" opacity="0.8"/>
  <rect x="450" y="220" width="80" height="60" fill="#f59e0b" opacity="0.7" rx="5"/>
  <polygon points="320,300 350,330 290,330" fill="#ef4444" opacity="0.8"/>
  
  <!-- Monitor stand -->
  <rect x="380" y="430" width="40" height="50" fill="#374151"/>
  <rect x="350" y="470" width="100" height="20" fill="#374151" rx="10"/>
  
  <!-- Keyboard -->
  <rect x="150" y="480" width="300" height="80" fill="#6b7280" rx="8"/>
  <rect x="160" y="490" width="280" height="60" fill="#9ca3af" rx="5"/>
  
  <!-- Key highlights -->
  <rect x="180" y="510" width="15" height="15" fill="#3b82f6" rx="2"/>
  <rect x="200" y="510" width="15" height="15" fill="#10b981" rx="2"/>
  <rect x="220" y="510" width="15" height="15" fill="#f59e0b" rx="2"/>
  <rect x="240" y="510" width="15" height="15" fill="#ef4444" rx="2"/>
  
  <!-- Mouse -->
  <ellipse cx="500" cy="520" rx="40" ry="60" fill="#4b5563"/>
  <ellipse cx="500" cy="520" rx="30" ry="50" fill="#6b7280"/>
  
  <!-- RGB lighting effects -->
  <circle cx="100" cy="500" r="25" fill="#ff0080" opacity="0.6"/>
  <circle cx="680" cy="500" r="25" fill="#00ff80" opacity="0.6"/>
  <circle cx="400" cy="80" r="30" fill="#8000ff" opacity="0.5"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">PREMIUM GAMING SETUP</text>
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6b7280">High-End Gaming Experience - Light Theme</text>
</svg>