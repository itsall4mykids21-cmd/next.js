<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark theme esports arena -->
  <defs>
    <linearGradient id="darkArenaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stageDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#darkArenaBg)"/>
  
  <!-- Ambient lighting strips -->
  <rect x="0" y="100" width="1200" height="10" fill="#ff0080" opacity="0.4"/>
  <rect x="0" y="650" width="1200" height="10" fill="#00ff80" opacity="0.4"/>
  
  <!-- Stage platform with neon edges -->
  <rect x="200" y="500" width="800" height="200" fill="url(#stageDark)" rx="20"/>
  <rect x="200" y="500" width="800" height="10" fill="#00ffff" opacity="0.8" rx="5" filter="url(#neonGlow)"/>
  
  <!-- Gaming stations with RGB lighting -->
  <g id="station1">
    <rect x="250" y="450" width="120" height="80" fill="#111827" rx="10"/>
    <rect x="260" y="460" width="100" height="60" fill="#1f2937" rx="5"/>
    <circle cx="310" cy="490" r="15" fill="#00ff88" filter="url(#neonGlow)"/>
    <rect x="250" y="445" width="120" height="5" fill="#ff0080" opacity="0.7"/>
  </g>
  
  <g id="station2">
    <rect x="420" y="450" width="120" height="80" fill="#111827" rx="10"/>
    <rect x="430" y="460" width="100" height="60" fill="#1f2937" rx="5"/>
    <circle cx="480" cy="490" r="15" fill="#00ff88" filter="url(#neonGlow)"/>
    <rect x="420" y="445" width="120" height="5" fill="#8000ff" opacity="0.7"/>
  </g>
  
  <g id="station3">
    <rect x="590" y="450" width="120" height="80" fill="#111827" rx="10"/>
    <rect x="600" y="460" width="100" height="60" fill="#1f2937" rx="5"/>
    <circle cx="650" cy="490" r="15" fill="#00ff88" filter="url(#neonGlow)"/>
    <rect x="590" y="445" width="120" height="5" fill="#0080ff" opacity="0.7"/>
  </g>
  
  <g id="station4">
    <rect x="760" y="450" width="120" height="80" fill="#111827" rx="10"/>
    <rect x="770" y="460" width="100" height="60" fill="#1f2937" rx="5"/>
    <circle cx="820" cy="490" r="15" fill="#00ff88" filter="url(#neonGlow)"/>
    <rect x="760" y="445" width="120" height="5" fill="#ff8000" opacity="0.7"/>
  </g>
  
  <!-- Large display screen with enhanced glow -->
  <rect x="400" y="200" width="400" height="225" fill="#030712" rx="15"/>
  <rect x="420" y="220" width="360" height="185" fill="#0891b2" rx="10" filter="url(#neonGlow)"/>
  
  <!-- Screen content with neon effects -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ffffff" filter="url(#neonGlow)">WORLD CHAMPIONSHIP</text>
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#f1f5f9">GRAND FINALS</text>
  <rect x="500" y="340" width="200" height="40" fill="#00ff88" rx="20" filter="url(#neonGlow)"/>
  <text x="600" y="365" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">LIVE STREAM</text>
  
  <!-- Audience seating with lighting -->
  <rect x="50" y="300" width="100" height="150" fill="#1e293b" rx="10"/>
  <rect x="1050" y="300" width="100" height="150" fill="#1e293b" rx="10"/>
  
  <!-- Enhanced lighting effects -->
  <circle cx="300" cy="150" r="50" fill="#ff0080" opacity="0.3" filter="url(#neonGlow)"/>
  <circle cx="600" cy="100" r="60" fill="#00ffff" opacity="0.4" filter="url(#neonGlow)"/>
  <circle cx="900" cy="150" r="50" fill="#8000ff" opacity="0.3" filter="url(#neonGlow)"/>
  
  <!-- Laser light effects -->
  <line x1="100" y1="150" x2="1100" y2="200" stroke="#ff0080" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="200" x2="1100" y2="150" stroke="#00ff80" stroke-width="2" opacity="0.6"/>
  
  <!-- Professional branding with glow -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffffff" filter="url(#neonGlow)">CYBER COLOSSEUM</text>
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#94a3b8">Elite Professional Gaming Arena - Dark Mode</text>
  
  <!-- Holographic elements -->
  <polygon points="150,250 200,300 100,300" fill="#00ffff" opacity="0.3" filter="url(#neonGlow)"/>
  <polygon points="1050,250 1100,300 1000,300" fill="#ff0080" opacity="0.3" filter="url(#neonGlow)"/>
</svg>